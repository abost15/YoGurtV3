name: Oppdater innkjøpspriser

on:
  schedule:
    - cron: '0 3 * * *'  # Daglig kl 05:00 norsk tid
  workflow_dispatch:       # Kan kjøres manuelt fra GitHub

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer avhengigheter
        run: pip install requests

      - name: Hent priser fra Oda og lagre i Firebase
        run: python scripts/fetch_prices.py
